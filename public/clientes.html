<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Clientes - PeruGym</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/styles-responsive.css">
  <!-- SPA redirect: si se accede directamente, redirigir al shell -->
  <script>if(!window.__SPA_SHELL__){window.location.replace('/app.html');}</script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-content">
      <div class="search-bar">
        <div class="search-input-wrap">
          <span class="search-icon" id="search-icon-el"></span>
          <input type="text" id="search" class="form-control" placeholder="Buscar por nombre, DNI o email...">
        </div>
        <select id="filter-activo" class="form-control" style="width:140px">
          <option value="">Todos</option>
          <option value="true">Activos</option>
          <option value="false">Inactivos</option>
        </select>
        <select id="filter-membresia" class="form-control" style="width:160px">
          <option value="">Membresía</option>
          <option value="con">Con membresía</option>
          <option value="sin">Sin membresía</option>
          <option value="activo">Membresía activa</option>
          <option value="vencida">Membresía vencida</option>
        </select>
        <select id="filter-vence" class="form-control" style="width:170px">
          <option value="">Vence pronto</option>
          <option value="7">Vence en 7 días</option>
          <option value="15">Vence en 15 días</option>
          <option value="30">Vence en 30 días</option>
        </select>
        <button class="btn btn-primary" id="btn-new" style="display:inline-flex;align-items:center;gap:6px"><span id="icon-new-cliente"></span> Nuevo Cliente</button>
        <button class="btn btn-success" id="btn-exportar-cl" style="display:inline-flex;align-items:center;gap:6px"><span id="icon-excel-cl"></span> Exportar Excel</button>
      </div>
      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead><tr><th>Cliente</th><th>DNI</th><th>Membresía</th><th>Vencimiento</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody id="clientes-table"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Nuevo Cliente</h3>
      <button class="btn btn-icon btn-outline" id="btn-close-modal-cl" style="display:inline-flex;align-items:center"><span id="icon-close-cl"></span></button>
    </div>
    <div class="modal-body">
      <form id="cliente-form">
        <input type="hidden" id="cliente-id">
        <div style="text-align:center;margin-bottom:16px">
          <img id="foto-preview" class="photo-preview hidden" src="" alt="foto">
          <div id="foto-placeholder" style="width:80px;height:80px;border-radius:50%;background:var(--primary);display:inline-flex;align-items:center;justify-content:center;color:#fff"></div>
          <div class="mt-1">
            <label class="btn btn-outline btn-sm" style="cursor:pointer;display:inline-flex;align-items:center;gap:4px">
              <span id="icon-camera-cl"></span> Foto <input type="file" id="foto" accept="image/*" style="display:none">
            </label>
          </div>
        </div>
        <!-- DNI + botón RENIEC -->
        <div class="form-group">
          <label>DNI</label>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="text" id="c-dni" class="form-control" maxlength="8" placeholder="Ej: 46027897" style="flex:1">
            <button type="button" class="btn btn-outline btn-sm" id="btn-buscar-dni" style="white-space:nowrap;display:inline-flex;align-items:center;gap:4px">
              <span id="icon-reniec"></span> Buscar DNI
            </button>
          </div>
          <small id="reniec-status" style="color:var(--text-light);font-size:11px;margin-top:4px;display:block"></small>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Nombres *</label><input type="text" id="c-nombre" class="form-control" required placeholder="Nombres"></div>
          <div class="form-group"><label>Apellido Paterno</label><input type="text" id="c-apellido-paterno" class="form-control" placeholder="Apellido paterno"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Apellido Materno</label><input type="text" id="c-apellido-materno" class="form-control" placeholder="Apellido materno"></div>
          <div class="form-group"><label>Teléfono</label><input type="text" id="c-telefono" class="form-control"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Email</label><input type="email" id="c-email" class="form-control"></div>
        </div>
        <div class="form-group"><label>Notas</label><textarea id="c-notas" class="form-control" rows="2"></textarea></div>
        <div class="form-group hidden" id="activo-group">
          <label><input type="checkbox" id="c-activo"> Cliente activo</label>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="btn-cancel-modal-cl">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-cliente">Guardar</button>
    </div>
  </div>
</div>

<script src="/js/cache.js"></script>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/icons.js"></script>
<script src="/js/layout.js"></script>
<script>
  let currentPage = 1;
  let allClientes = [];
  let tablePaginator = null;

  function _pageActive() {
    return !!document.getElementById('clientes-table');
  }

  function renderRow(c) {
    const days = daysUntil(c.fecha_fin);
    const expClass = days !== null && days <= 7 ? 'badge-warning' : days !== null && days < 0 ? 'badge-danger' : 'badge-info';
    const estadoMem = c.membresia_estado
      ? `<span class="badge ${c.membresia_estado === 'activo' ? 'badge-success' : 'badge-danger'}">${c.membresia_estado}</span>`
      : '<span style="color:var(--text-light)">Sin membresía</span>';
    return `<tr>
      <td data-label="Cliente">
        <div class="member-cell">
          ${c.foto_url
            ? `<img src="${c.foto_url}" class="member-avatar" alt="${c.nombre}">`
            : `<div class="member-avatar" style="display:flex;align-items:center;justify-content:center">${avatarInitials(c.nombre)}</div>`}
          <div>
            <div style="font-weight:600">${[c.apellido_paterno, c.apellido_materno, c.nombre].filter(Boolean).join(' ') || c.nombre}</div>
            <div style="font-size:12px;color:var(--text-light)">${c.email || c.telefono || ''}</div>
          </div>
        </div>
      </td>
      <td data-label="DNI">${c.dni || '-'}</td>
      <td data-label="Membresía">${estadoMem}<div style="font-size:11px;color:var(--text-light)">${c.plan_nombre || ''}</div></td>
      <td data-label="Vencimiento">${c.fecha_fin ? `<span class="badge ${expClass}">${fmtDate(c.fecha_fin)}</span>` : '-'}</td>
      <td data-label="Estado"><span class="badge ${c.activo ? 'badge-success' : 'badge-danger'}">${c.activo ? 'Activo' : 'Inactivo'}</span></td>
      <td data-label="Acciones">
        <button class="btn btn-sm btn-outline" title="Editar" onclick="editCliente('${c.id}')">${icon('edit')}</button>
        <button class="btn btn-sm btn-outline" title="Asignar membresía" onclick="irAMembresia('${c.id}')">${icon('membresias')}</button>
        <button class="btn btn-sm btn-danger" title="Eliminar" onclick="withLoading(this, () => deleteCliente('${c.id}', '${c.nombre.replace(/'/g, "\\'")}'), 'Eliminando...')">${icon('trash')}</button>
      </td>
    </tr>`;
  }

  function getFilteredClientes() {
    const searchEl = document.getElementById('search');
    const activoEl = document.getElementById('filter-activo');
    const memEl = document.getElementById('filter-membresia');
    const venceEl = document.getElementById('filter-vence');
    if (!searchEl || !activoEl) return [];
    const search = searchEl.value.toLowerCase();
    const activo = activoEl.value;
    const membresia = memEl ? memEl.value : '';
    const vence = venceEl ? venceEl.value : '';

    return allClientes.filter(c => {
      if (search) {
        const fullName = [c.nombre, c.apellido_paterno, c.apellido_materno, c.dni, c.email].filter(Boolean).join(' ').toLowerCase();
        if (!fullName.includes(search)) return false;
      }
      if (activo === 'true' && !c.activo) return false;
      if (activo === 'false' && c.activo) return false;
      if (membresia === 'con' && !c.membresia_estado) return false;
      if (membresia === 'sin' && c.membresia_estado) return false;
      if (membresia === 'activo' && c.membresia_estado !== 'activo') return false;
      if (membresia === 'vencida' && c.membresia_estado !== 'vencido') return false;
      if (vence && c.fecha_fin) {
        const d = daysUntil(c.fecha_fin);
        if (d === null || d < 0 || d > parseInt(vence)) return false;
      }
      if (vence && !c.fecha_fin) return false;
      return true;
    });
  }

  function refreshTable() {
    if (!_pageActive()) return;
    const filtered = getFilteredClientes();
    if (tablePaginator) {
      tablePaginator.setData(filtered);
    } else {
      tablePaginator = initTablePagination('pagination', 'clientes-table', filtered, 10, renderRow);
    }
  }

  async function loadClientes() {
    showTableSkeleton('clientes-table', 6);
    try {
      const data = await api.get('/clientes?limit=500');
      allClientes = data.data;
      refreshTable();
    } catch (err) { toast(err.message, 'error'); }
  }

  async function editCliente(id) {
    try {
      const c = await api.get(`/clientes/${id}`);
      document.getElementById('cliente-id').value = c.id;
      document.getElementById('c-nombre').value = c.nombre;
      document.getElementById('c-apellido-paterno').value = c.apellido_paterno || '';
      document.getElementById('c-apellido-materno').value = c.apellido_materno || '';
      document.getElementById('c-dni').value = c.dni || '';
      document.getElementById('c-email').value = c.email || '';
      document.getElementById('c-telefono').value = c.telefono || '';
      document.getElementById('c-notas').value = c.notas || '';
      document.getElementById('c-activo').checked = c.activo;
      document.getElementById('activo-group').classList.remove('hidden');
      document.getElementById('modal-title').textContent = 'Editar Cliente';
      document.getElementById('reniec-status').textContent = '';
      if (c.foto_url) {
        document.getElementById('foto-preview').src = c.foto_url;
        document.getElementById('foto-preview').classList.remove('hidden');
        document.getElementById('foto-placeholder').style.display = 'none';
      }
      openModal('modal-overlay');
    } catch (err) { toast(err.message, 'error'); }
  }

  async function saveCliente() {
    const id = document.getElementById('cliente-id').value;
    const formData = new FormData();
    formData.append('nombre',           document.getElementById('c-nombre').value.trim());
    formData.append('apellido_paterno', document.getElementById('c-apellido-paterno').value.trim());
    formData.append('apellido_materno', document.getElementById('c-apellido-materno').value.trim());
    formData.append('dni',              document.getElementById('c-dni').value.trim());
    formData.append('email',            document.getElementById('c-email').value.trim());
    formData.append('telefono',         document.getElementById('c-telefono').value.trim());
    formData.append('notas',            document.getElementById('c-notas').value.trim());
    if (id) formData.append('activo', document.getElementById('c-activo').checked);
    const fotoFile = document.getElementById('foto').files[0];
    if (fotoFile) formData.append('foto', fotoFile);
    try {
      const url = id ? `/api/clientes/${id}` : '/api/clientes';
      const res = await fetch(url, {
        method: id ? 'PUT' : 'POST',
        headers: { Authorization: `Bearer ${api.getToken()}` },
        body: formData
      });
      if (!res.ok) throw new Error((await res.json()).error);
      const data = await res.json().catch(() => null);

      if (id && data) {
        gymCache.patchItem('clientes', id, () => data);
        const idx = allClientes.findIndex(c => c.id === id || c._id === id);
        if (idx !== -1) allClientes[idx] = { ...allClientes[idx], ...data };
      } else {
        gymCache.invalidate('clientes');
        if (data) allClientes.unshift(data);
      }

      toast(id ? 'Cliente actualizado' : 'Cliente creado');
      closeModal('modal-overlay');
      refreshTable();
    } catch (err) { toast(err.message, 'error'); }
  }

  // ── Consulta RENIEC ──────────────────────────────────────────────────────────
  async function buscarDNI() {
    const dni = document.getElementById('c-dni').value.trim();
    const statusEl = document.getElementById('reniec-status');
    const btnBuscar = document.getElementById('btn-buscar-dni');

    if (!/^\d{8}$/.test(dni)) {
      statusEl.style.color = 'var(--danger)';
      statusEl.textContent = 'Ingresa un DNI válido de 8 dígitos.';
      return;
    }

    // Estado de carga
    btnBuscar.disabled = true;
    statusEl.style.color = 'var(--text-light)';
    statusEl.textContent = 'Consultando RENIEC...';

    try {
      const data = await api.get(`/clientes/reniec/${dni}`, true); // force=true, sin caché
      // Rellenar campos automáticamente
      document.getElementById('c-nombre').value           = data.first_name       || '';
      document.getElementById('c-apellido-paterno').value = data.first_last_name  || '';
      document.getElementById('c-apellido-materno').value = data.second_last_name || '';
      statusEl.style.color = 'var(--success, #22c55e)';
      statusEl.textContent = `✓ Datos obtenidos: ${data.full_name}`;
    } catch (err) {
      statusEl.style.color = 'var(--danger)';
      statusEl.textContent = err.message || 'No se encontró el DNI en RENIEC.';
    } finally {
      btnBuscar.disabled = false;
    }
  }

  function irAMembresia(clienteId) {
    // En modo SPA: navegar al router con parámetro en sessionStorage
    // En modo standalone: redirigir directamente
    if (window.__SPA_SHELL__ && typeof GymRouter !== 'undefined') {
      sessionStorage.setItem('_spa_param_cliente_id', clienteId);
      GymRouter.navigate('membresias');
    } else {
      window.location.href = `/membresias.html?cliente_id=${clienteId}`;
    }
  }

  async function deleteCliente(id, nombre) {
    const ok = await confirmDialog({
      title: 'Eliminar cliente',
      message: `¿Eliminar a <strong>${nombre}</strong>? Esta acción no se puede deshacer.`,
      confirmText: 'Sí, eliminar',
      type: 'danger'
    });
    if (!ok) return;
    try {
      await api.delete(`/clientes/${id}`, {
        remove: { ns: 'clientes', id },
      });
      allClientes = allClientes.filter(c => c.id !== id && c._id !== id);
      toast('Cliente eliminado');
      refreshTable();
    } catch (err) { toast(err.message, 'error'); }
  }

  function exportarClientes() {
    api.download('/reports/clientes/excel', 'clientes.xlsx').then(() => toast('Descarga iniciada')).catch(err => toast(err.message, 'error'));
  }

  // Exponer al scope global para los onclick inline generados en template strings
  window.editCliente   = editCliente;
  window.irAMembresia  = irAMembresia;
  window.deleteCliente = deleteCliente;

  // ── Inicialización: asignaciones al DOM y arranque ──────────────────────────
  (function _initPage() {
    console.log('[Clientes] 🚀 Iniciando página...');
    
    // Verificar que los elementos críticos existan
    const tabla = document.getElementById('clientes-table');
    if (!tabla) {
      console.error('[Clientes] ❌ ERROR: No se encontró #clientes-table');
      return;
    }
    console.log('[Clientes] ✅ Tabla encontrada');

    initLayout('clientes', 'Clientes');

    const elSearch   = document.getElementById('search-icon-el');
    const elNew      = document.getElementById('icon-new-cliente');
    const elExcel    = document.getElementById('icon-excel-cl');
    const elReniec   = document.getElementById('icon-reniec');
    if (elSearch) elSearch.innerHTML   = icon('search');
    if (elNew)    elNew.innerHTML      = icon('plus');
    if (elExcel)  elExcel.innerHTML    = icon('excel');
    if (elReniec) elReniec.innerHTML   = icon('search');

    const elBtnBuscarDni = document.getElementById('btn-buscar-dni');
    if (elBtnBuscarDni) elBtnBuscarDni.onclick = buscarDNI;

    const elBtnSave = document.getElementById('btn-save-cliente');
    if (elBtnSave) elBtnSave.onclick = function() { withLoading(this, saveCliente); };

    const elBtnExportar = document.getElementById('btn-exportar-cl');
    if (elBtnExportar) elBtnExportar.onclick = exportarClientes;

    const elBtnCloseModal = document.getElementById('btn-close-modal-cl');
    if (elBtnCloseModal) elBtnCloseModal.onclick = () => closeModal('modal-overlay');

    const elBtnCancelModal = document.getElementById('btn-cancel-modal-cl');
    if (elBtnCancelModal) elBtnCancelModal.onclick = () => closeModal('modal-overlay');

    const elBtnNew = document.getElementById('btn-new');
    if (elBtnNew) {
      elBtnNew.onclick = () => {
        document.getElementById('cliente-form').reset();
        document.getElementById('cliente-id').value = '';
        document.getElementById('modal-title').textContent = 'Nuevo Cliente';
        document.getElementById('activo-group').classList.add('hidden');
        document.getElementById('foto-preview').classList.add('hidden');
        document.getElementById('foto-placeholder').style.display = '';
        document.getElementById('reniec-status').textContent = '';
        const icoCam = document.getElementById('icon-camera-cl');
        const icoClose = document.getElementById('icon-close-cl');
        const icoReniec = document.getElementById('icon-reniec');
        const fotoPlaceholder = document.getElementById('foto-placeholder');
        if (icoCam && !icoCam.innerHTML) icoCam.innerHTML = icon('camera');
        if (icoClose && !icoClose.innerHTML) icoClose.innerHTML = icon('close');
        if (icoReniec) icoReniec.innerHTML = icon('search');
        if (fotoPlaceholder && !fotoPlaceholder.innerHTML) fotoPlaceholder.innerHTML = icon('user');
        openModal('modal-overlay');
      };
    }

    const elFoto = document.getElementById('foto');
    if (elFoto) {
      elFoto.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = ev => {
            document.getElementById('foto-preview').src = ev.target.result;
            document.getElementById('foto-preview').classList.remove('hidden');
            document.getElementById('foto-placeholder').style.display = 'none';
          };
          reader.readAsDataURL(file);
        }
      };
    }

    let searchTimer;
    const elSearchInput = document.getElementById('search');
    if (elSearchInput) elSearchInput.oninput = () => { clearTimeout(searchTimer); searchTimer = setTimeout(() => loadClientes(), 400); };
    const elFilterActivo = document.getElementById('filter-activo');
    if (elFilterActivo) elFilterActivo.onchange = () => loadClientes();
    const elFilterMembresia = document.getElementById('filter-membresia');
    if (elFilterMembresia) elFilterMembresia.onchange = () => loadClientes();
    const elFilterVence = document.getElementById('filter-vence');
    if (elFilterVence) elFilterVence.onchange = () => loadClientes();

    console.log('[Clientes] 🔄 Cargando datos...');
    loadClientes().catch(err => {
      console.error('[Clientes] ❌ Error en carga inicial:', err);
      toast('Error al cargar clientes: ' + err.message, 'error');
    });
  })();

  // Exponer funciones al scope global para que los onclick funcionen en el SPA
  window.editCliente    = editCliente;
  window.deleteCliente  = deleteCliente;
  window.irAMembresia   = irAMembresia;
  window.saveCliente    = saveCliente;
  window.buscarDNI      = buscarDNI;
  window.exportarClientes = exportarClientes;
</script></body>
</html>
