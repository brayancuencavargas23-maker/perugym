<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Solicitudes - PeruGym</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/styles-responsive.css">
  <!-- SPA redirect: si se accede directamente, redirigir al shell -->
  <script>if(!window.__SPA_SHELL__){window.location.replace('/app.html');}</script>
  <style>
    .estado-badge-pendiente  { background:rgba(255,193,7,0.15);  color:#856404;  border:1px solid #ffc107; }
    .estado-badge-contactado { background:rgba(13,110,253,0.12); color:#084298;  border:1px solid #0d6efd; }
    .estado-badge-convertido { background:rgba(25,135,84,0.12);  color:#0a3622;  border:1px solid #198754; }
    .estado-badge-descartado { background:rgba(108,117,125,0.12);color:#495057;  border:1px solid #6c757d; }
    .estado-badge { font-size:11px; padding:2px 10px; border-radius:20px; font-weight:600; display:inline-block; }
    .summary-bar { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
    .summary-item { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:10px 18px; display:flex; flex-direction:column; align-items:center; min-width:100px; }
    .summary-num  { font-size:24px; font-weight:700; }
    .summary-lbl  { font-size:11px; color:var(--text-light); margin-top:2px; }
    .summary-item.pend  { border-color:#ffc107; }
    .summary-item.cont  { border-color:#0d6efd; }
    .summary-item.conv  { border-color:#198754; }
    .summary-item.desc  { border-color:#6c757d; }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-content">

      <!-- Resumen de estados -->
      <div class="summary-bar" id="summary-bar">
        <div class="summary-item pend"><div class="summary-num" id="cnt-pendiente">-</div><div class="summary-lbl">🟡 Pendientes</div></div>
        <div class="summary-item cont"><div class="summary-num" id="cnt-contactado">-</div><div class="summary-lbl">🔵 Contactados</div></div>
        <div class="summary-item conv"><div class="summary-num" id="cnt-convertido">-</div><div class="summary-lbl">🟢 Convertidos</div></div>
        <div class="summary-item desc"><div class="summary-num" id="cnt-descartado">-</div><div class="summary-lbl">⚫ Descartados</div></div>
      </div>

      <!-- Barra de filtros -->
      <div class="search-bar">
        <select id="filter-estado" class="form-control" style="width:180px">
          <option value="">Todos los estados</option>
          <option value="pendiente">Pendiente</option>
          <option value="contactado">Contactado</option>
          <option value="convertido">Convertido</option>
          <option value="descartado">Descartado</option>
        </select>
        <select id="filter-plan-sol" class="form-control" style="width:160px">
          <option value="">Todos los planes</option>
        </select>
        <input type="date" id="filter-sol-desde" class="form-control" style="width:150px" title="Fecha desde">
        <input type="date" id="filter-sol-hasta" class="form-control" style="width:150px" title="Fecha hasta">
        <select id="filter-sin-contacto" class="form-control" style="width:170px">
          <option value="">Seguimiento</option>
          <option value="3">Sin contacto 3+ días</option>
          <option value="7">Sin contacto 7+ días</option>
          <option value="15">Sin contacto 15+ días</option>
        </select>
        <button class="btn btn-outline" id="btn-refresh" style="display:inline-flex;align-items:center;gap:6px">
          <span id="icon-refresh-sol"></span> Actualizar
        </button>
      </div>

      <!-- Tabla -->
      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Plan Solicitado</th>
                <th>Estado</th>
                <th>Notas</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="solicitudes-table"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Modal: Ver / Editar estado ─────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="modal-detalle">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h3>Detalle de Solicitud</h3>
      <button class="btn btn-icon btn-outline" onclick="closeModal('modal-detalle')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="det-id">
      <div style="background:var(--bg);border-radius:8px;padding:14px;margin-bottom:16px;font-size:13px;display:grid;grid-template-columns:1fr 1fr;gap:8px" id="det-info"></div>
      <div class="form-group">
        <label>Estado</label>
        <select id="det-estado" class="form-control">
          <option value="pendiente">Pendiente</option>
          <option value="contactado">Contactado</option>
          <option value="descartado">Descartado</option>
        </select>
      </div>
      <div class="form-group">
        <label>Notas internas</label>
        <textarea id="det-notas" class="form-control" rows="3" placeholder="Ej: Llamé, viene mañana a las 3pm..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-detalle')">Cancelar</button>
      <button class="btn btn-primary" onclick="withLoading(this, guardarEstado, 'Guardando...')">Guardar cambios</button>
    </div>
  </div>
</div>

<!-- ── Modal: Convertir a Cliente ─────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="modal-convertir">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h3>Convertir a Cliente</h3>
      <button class="btn btn-icon btn-outline" onclick="closeModal('modal-convertir')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="conv-id">

      <!-- Banner caja cerrada -->
      <div id="conv-banner-caja" class="hidden" style="background:rgba(220,53,69,0.10);border:1.5px solid var(--danger);border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;font-size:13px;color:#721c24">
        🔒 No hay caja abierta. <a href="/caja.html" style="font-weight:700;color:var(--danger)">Abrir caja →</a>
      </div>

      <!-- Resumen del lead -->
      <div style="background:var(--bg);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px" id="conv-info"></div>

      <!-- DNI + botón RENIEC -->
      <div class="form-group">
        <label>DNI</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" id="conv-dni" class="form-control" maxlength="8" placeholder="Ej: 46027897" style="flex:1">
          <button type="button" class="btn btn-outline btn-sm" id="btn-conv-buscar-dni" style="white-space:nowrap">
            Buscar DNI
          </button>
        </div>
        <small id="conv-reniec-status" style="color:var(--text-light);font-size:11px;margin-top:4px;display:block"></small>
      </div>

      <!-- Nombres y apellidos (autocompletados por RENIEC) -->
      <div class="form-row">
        <div class="form-group">
          <label>Nombres</label>
          <input type="text" id="conv-nombre" class="form-control" placeholder="Nombres">
        </div>
        <div class="form-group">
          <label>Apellido Paterno</label>
          <input type="text" id="conv-apellido-paterno" class="form-control" placeholder="Apellido paterno">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Apellido Materno</label>
          <input type="text" id="conv-apellido-materno" class="form-control" placeholder="Apellido materno">
        </div>
        <div class="form-group">
          <label>Fecha inicio membresía</label>
          <input type="date" id="conv-inicio" class="form-control">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Método de pago</label>
          <select id="conv-metodo" class="form-control">
            <option value="efectivo">Efectivo</option>
            <option value="yape">Yape</option>
            <option value="plin">Plin</option>
            <option value="transferencia">Transferencia</option>
          </select>
        </div>
        <div class="form-group">
          <label>Estado del pago</label>
          <select id="conv-estado-pago" class="form-control">
            <option value="pagado">Pagado ahora</option>
            <option value="pendiente">Pendiente (deuda)</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Notas del pago <span style="color:var(--text-light);font-size:11px">(opcional)</span></label>
        <textarea id="conv-notas" class="form-control" rows="2"></textarea>
      </div>
      <p style="font-size:12px;color:var(--text-light);margin-top:4px">
        ✅ Se creará el cliente, la membresía y el pago automáticamente.
      </p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-convertir')">Cancelar</button>
      <button class="btn btn-success" id="btn-confirmar-conv" onclick="withLoading(this, confirmarConversion, 'Convirtiendo...')">
        Confirmar y Crear Cliente
      </button>
    </div>
  </div>
</div>

<script src="/js/cache.js"></script>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/icons.js"></script>
<script src="/js/layout.js"></script>
<script>
  let currentPage = 1;
  let cajaActual = null;
  let allSolicitudes = [];
  let tablePaginator = null;

  function _pageActive() {
    return !!document.getElementById('solicitudes-table');
  }

  async function checkCaja() {
    try { cajaActual = await api.get('/caja/estado'); } catch { cajaActual = null; }
  }

  async function loadStats(force = false) {
    try {
      const stats = await api.get('/solicitudes/stats', force);
      if (!_pageActive()) return;
      const cntPendiente  = document.getElementById('cnt-pendiente');
      const cntContactado = document.getElementById('cnt-contactado');
      const cntConvertido = document.getElementById('cnt-convertido');
      const cntDescartado = document.getElementById('cnt-descartado');
      if (cntPendiente)  cntPendiente.textContent  = stats.pendiente;
      if (cntContactado) cntContactado.textContent = stats.contactado;
      if (cntConvertido) cntConvertido.textContent = stats.convertido;
      if (cntDescartado) cntDescartado.textContent = stats.descartado;
      const badge = document.getElementById('nav-badge-solicitudes');
      if (badge) {
        badge.textContent = stats.pendiente;
        badge.style.display = stats.pendiente > 0 ? 'inline-block' : 'none';
      }
    } catch {}
  }

  function renderRow(s) {
    const estadoClass = {
      pendiente:  'estado-badge-pendiente',
      contactado: 'estado-badge-contactado',
      convertido: 'estado-badge-convertido',
      descartado: 'estado-badge-descartado',
    }[s.estado] || '';

    const whatsappUrl = `https://wa.me/51${s.telefono.replace(/\D/g,'')}?text=${encodeURIComponent(`Hola ${s.nombre}, vi tu interés en el plan ${s.plan_nombre || ''}. ¿Cuándo puedes venir al gym?`)}`;

    const acciones = s.estado !== 'convertido' && s.estado !== 'descartado'
      ? `<button class="btn btn-sm btn-outline" title="Ver / Editar" onclick="abrirDetalle('${s.id}')">${icon('eye')}</button>
         <a class="btn btn-sm btn-outline" href="${whatsappUrl}" target="_blank" title="WhatsApp" style="display:inline-flex;align-items:center">
           <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
         </a>
         <button class="btn btn-sm btn-success" title="Convertir a cliente" onclick="abrirConvertir('${s.id}','${s.nombre.replace(/'/g,"\\'")}','${s.plan_nombre || ''}',${s.plan_precio || 0},'${s.telefono}','${s.email || ''}','${s.dni || ''}','${(s.apellido_paterno||'').replace(/'/g,"\\'")}','${(s.apellido_materno||'').replace(/'/g,"\\'")}')">
           ${icon('check')}</button>`
      : s.estado === 'convertido'
        ? `<a href="/clientes.html" class="btn btn-sm btn-outline" title="Ver clientes" style="display:inline-flex;align-items:center">${icon('clientes')}</a>`
        : `<button class="btn btn-sm btn-outline" title="Ver detalle" onclick="abrirDetalle('${s.id}')">${icon('eye')}</button>`;

    return `<tr>
      <td data-label="Fecha" style="font-size:12px;white-space:nowrap">${fmtDateTime(s.created_at)}</td>
      <td data-label="Nombre"><strong>${s.nombre}</strong></td>
      <td data-label="Teléfono">${s.telefono}</td>
      <td data-label="Plan">
        <strong>${s.plan_nombre || '-'}</strong>
        ${s.plan_precio ? `<div style="font-size:11px;color:var(--text-light)">${fmtMoney(s.plan_precio)}/mes</div>` : ''}
      </td>
      <td data-label="Estado"><span class="estado-badge ${estadoClass}">${s.estado}</span></td>
      <td data-label="Notas" style="font-size:12px;color:var(--text-light);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${s.notas || ''}">${s.notas || '-'}</td>
      <td data-label="Acciones" style="display:flex;gap:4px;flex-wrap:wrap">${acciones}</td>
    </tr>`;
  }

  function getFilteredSolicitudes() {
    const estadoEl = document.getElementById('filter-estado');
    const planEl = document.getElementById('filter-plan-sol');
    const desdeEl = document.getElementById('filter-sol-desde');
    const hastaEl = document.getElementById('filter-sol-hasta');
    const sinContactoEl = document.getElementById('filter-sin-contacto');
    const estado = estadoEl ? estadoEl.value : '';
    const plan = planEl ? planEl.value : '';
    const desde = desdeEl ? desdeEl.value : '';
    const hasta = hastaEl ? hastaEl.value : '';
    const sinContacto = sinContactoEl ? sinContactoEl.value : '';

    return allSolicitudes.filter(s => {
      if (estado && s.estado !== estado) return false;
      if (plan && s.plan_nombre !== plan) return false;
      if (desde && s.created_at) {
        if (new Date(s.created_at) < new Date(desde)) return false;
      }
      if (hasta && s.created_at) {
        const hastaDate = new Date(hasta);
        hastaDate.setHours(23, 59, 59);
        if (new Date(s.created_at) > hastaDate) return false;
      }
      if (sinContacto && s.created_at) {
        const dias = daysUntil(s.created_at);
        if (dias === null || Math.abs(dias) < parseInt(sinContacto)) return false;
      }
      return true;
    });
  }

  function refreshTable() {
    if (!_pageActive()) return;
    const filtered = getFilteredSolicitudes();
    if (tablePaginator) {
      tablePaginator.setData(filtered);
    } else {
      tablePaginator = initTablePagination('pagination', 'solicitudes-table', filtered, 10, renderRow);
    }
  }

  async function loadSolicitudes(force = false) {
    if (!_pageActive()) return;
    showTableSkeleton('solicitudes-table', 7);
    try {
      const data = await api.get('/solicitudes?limit=500', force);
      if (!_pageActive()) return;
      allSolicitudes = data.data;

      const filterPlanSol = document.getElementById('filter-plan-sol');
      if (filterPlanSol && filterPlanSol.options.length <= 1) {
        const planes = [...new Set(allSolicitudes.map(s => s.plan_nombre).filter(Boolean))];
        filterPlanSol.innerHTML = '<option value="">Todos los planes</option>' +
          planes.map(p => `<option value="${p}">${p}</option>`).join('');
      }

      refreshTable();
    } catch (err) { toast(err.message, 'error'); }
  }

  async function abrirDetalle(id) {
    try {
      const s = allSolicitudes.find(x => x.id === id || x._id === id);
      if (!s) return toast('Solicitud no encontrada', 'error');

      document.getElementById('det-id').value = s.id;
      document.getElementById('det-estado').value = s.estado;
      document.getElementById('det-notas').value = s.notas || '';
      document.getElementById('det-info').innerHTML = `
        <div><span style="color:var(--text-light)">Nombre</span><br><strong>${s.nombre}</strong></div>
        <div><span style="color:var(--text-light)">Teléfono</span><br><strong>${s.telefono}</strong></div>
        <div><span style="color:var(--text-light)">Email</span><br>${s.email || '-'}</div>
        <div><span style="color:var(--text-light)">Plan</span><br><strong>${s.plan_nombre || '-'}</strong></div>
        <div><span style="color:var(--text-light)">Fecha solicitud</span><br>${fmtDateTime(s.created_at)}</div>
        <div><span style="color:var(--text-light)">Atendido por</span><br>${s.atendido_por_nombre || 'Sin asignar'}</div>
      `;
      openModal('modal-detalle');
    } catch (err) { toast(err.message, 'error'); }
  }

  async function guardarEstado() {
    const id = document.getElementById('det-id').value;
    const estado = document.getElementById('det-estado').value;
    const notas = document.getElementById('det-notas').value;
    try {
      await api.put(`/solicitudes/${id}/estado`, { estado, notas });
      const idx = allSolicitudes.findIndex(s => s.id === id || s._id === id);
      if (idx !== -1) allSolicitudes[idx] = { ...allSolicitudes[idx], estado, notas };
      toast('Solicitud actualizada');
      closeModal('modal-detalle');
      refreshTable();
      loadStats(true);
    } catch (err) { toast(err.message, 'error'); }
  }

  function abrirConvertir(id, nombre, planNombre, planPrecio, telefono, email, dni, apellidoPaterno, apellidoMaterno) {
    document.getElementById('conv-id').value = id;
    document.getElementById('conv-dni').value              = dni || '';
    document.getElementById('conv-nombre').value           = nombre || '';
    document.getElementById('conv-apellido-paterno').value = apellidoPaterno || '';
    document.getElementById('conv-apellido-materno').value = apellidoMaterno || '';
    document.getElementById('conv-inicio').value           = new Date().toISOString().split('T')[0];
    document.getElementById('conv-metodo').value           = 'efectivo';
    document.getElementById('conv-estado-pago').value      = 'pagado';
    document.getElementById('conv-notas').value            = '';
    document.getElementById('conv-reniec-status').textContent = dni ? '✓ DNI precargado desde la solicitud' : '';
    document.getElementById('conv-reniec-status').style.color = 'var(--success, #22c55e)';
    document.getElementById('conv-info').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><span style="color:var(--text-light)">Teléfono</span><br>${telefono}</div>
        <div><span style="color:var(--text-light)">Email</span><br>${email || '-'}</div>
        <div><span style="color:var(--text-light)">Plan</span><br><strong>${planNombre}</strong> — ${fmtMoney(planPrecio)}</div>
      </div>
    `;

    const banner = document.getElementById('conv-banner-caja');
    const btnConv = document.getElementById('btn-confirmar-conv');
    if (!cajaActual) {
      banner.classList.remove('hidden');
      btnConv.disabled = true;
    } else {
      banner.classList.add('hidden');
      btnConv.disabled = false;
    }

    const btnBuscarDni = document.getElementById('btn-conv-buscar-dni');
    if (btnBuscarDni) btnBuscarDni.onclick = buscarDniConvertir;

    openModal('modal-convertir');
  }

  async function buscarDniConvertir() {
    const dni       = document.getElementById('conv-dni').value.trim();
    const statusEl  = document.getElementById('conv-reniec-status');
    const btnBuscar = document.getElementById('btn-conv-buscar-dni');

    if (!/^\d{8}$/.test(dni)) {
      statusEl.style.color = 'var(--danger)';
      statusEl.textContent = 'Ingresa un DNI válido de 8 dígitos.';
      return;
    }

    btnBuscar.disabled   = true;
    statusEl.style.color = 'var(--text-light)';
    statusEl.textContent = 'Consultando RENIEC...';

    try {
      const data = await api.get(`/clientes/reniec/${dni}`, true);
      document.getElementById('conv-nombre').value           = data.first_name       || '';
      document.getElementById('conv-apellido-paterno').value = data.first_last_name  || '';
      document.getElementById('conv-apellido-materno').value = data.second_last_name || '';
      statusEl.style.color = 'var(--success, #22c55e)';
      statusEl.textContent = `✓ ${data.full_name}`;
    } catch (err) {
      statusEl.style.color = 'var(--danger)';
      statusEl.textContent = err.message || 'DNI no encontrado en RENIEC.';
    } finally {
      btnBuscar.disabled = false;
    }
  }

  async function confirmarConversion() {
    if (!cajaActual) { toast('Abre la caja antes de convertir', 'warning'); return; }
    const id = document.getElementById('conv-id').value;
    try {
      await api.post(`/solicitudes/${id}/convertir`, {
        dni:              document.getElementById('conv-dni').value.trim() || null,
        nombre:           document.getElementById('conv-nombre').value.trim() || null,
        apellido_paterno: document.getElementById('conv-apellido-paterno').value.trim() || null,
        apellido_materno: document.getElementById('conv-apellido-materno').value.trim() || null,
        fecha_inicio:     document.getElementById('conv-inicio').value,
        metodo_pago:      document.getElementById('conv-metodo').value,
        estado_pago:      document.getElementById('conv-estado-pago').value,
        notas_membresia:  document.getElementById('conv-notas').value || null,
        caja_id:          cajaActual.id,
      }, false, { invalidate: ['solicitudes', 'clientes', 'membresias', 'pagos'] });
      const idx = allSolicitudes.findIndex(s => s.id === id || s._id === id);
      if (idx !== -1) allSolicitudes[idx] = { ...allSolicitudes[idx], estado: 'convertido' };
      toast('¡Cliente creado con membresía y pago registrados!', 'success');
      closeModal('modal-convertir');
      refreshTable();
      loadStats(true);
    } catch (err) { toast(err.message, 'error'); }
  }

  window.abrirDetalle       = abrirDetalle;
  window.abrirConvertir     = abrirConvertir;
  window.guardarEstado      = guardarEstado;
  window.confirmarConversion = confirmarConversion;
  window.buscarDniConvertir = buscarDniConvertir;

  let _lastPendingCount = null;
  let _pollingTimer = null;

  async function pollNuevasSolicitudes() {
    try {
      const stats = await api.get('/solicitudes/stats', true);
      const nuevasCantidad = stats.pendiente;

      if (_lastPendingCount !== null && nuevasCantidad > _lastPendingCount) {
        const diff = nuevasCantidad - _lastPendingCount;
        gymCache.invalidate('solicitudes');
        await loadSolicitudes(true);
        await loadStats(true);
        toast(`🔔 ${diff} nueva${diff > 1 ? 's' : ''} solicitud${diff > 1 ? 'es' : ''} recibida${diff > 1 ? 's' : ''}`, 'success');
      }

      _lastPendingCount = nuevasCantidad;
    } catch {}
  }

  function startPolling(intervalMs = 45000) {
    stopPolling();
    _pollingTimer = setInterval(pollNuevasSolicitudes, intervalMs);
  }

  function stopPolling() {
    if (_pollingTimer) { clearInterval(_pollingTimer); _pollingTimer = null; }
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) stopPolling();
    else startPolling();
  }, { signal: window.__spaPageAbort?.signal });

  const _elFilterEstado = document.getElementById('filter-estado');
  if (_elFilterEstado) _elFilterEstado.onchange = () => refreshTable();
  const _elFilterPlanSol = document.getElementById('filter-plan-sol');
  if (_elFilterPlanSol) _elFilterPlanSol.onchange = () => refreshTable();
  const _elFilterSolDesde = document.getElementById('filter-sol-desde');
  if (_elFilterSolDesde) _elFilterSolDesde.onchange = () => refreshTable();
  const _elFilterSolHasta = document.getElementById('filter-sol-hasta');
  if (_elFilterSolHasta) _elFilterSolHasta.onchange = () => refreshTable();
  const _elFilterSinContacto = document.getElementById('filter-sin-contacto');
  if (_elFilterSinContacto) _elFilterSinContacto.onchange = () => refreshTable();
  const _elBtnRefresh = document.getElementById('btn-refresh');
  if (_elBtnRefresh) _elBtnRefresh.onclick = () => {
    gymCache.invalidate('solicitudes');
    loadStats(true);
    loadSolicitudes(true);
  };

  (async function _initSolicitudes() {
    initLayout('solicitudes', 'Solicitudes');
    const elRefresh = document.getElementById('icon-refresh-sol');
    if (elRefresh) elRefresh.innerHTML = icon('refresh');

    if (!_pageActive()) return;
    
    try {
      await checkCaja();
      await loadStats();
      await loadSolicitudes();
      
      try {
        const stats = await api.get('/solicitudes/stats', true);
        _lastPendingCount = stats.pendiente;
      } catch (err) { /* ignorar */ }
      
      startPolling();
    } catch (err) {
      toast('Error al cargar solicitudes: ' + err.message, 'error');
    }
  })();

  window.abrirDetalle        = abrirDetalle;
  window.guardarEstado       = guardarEstado;
  window.abrirConvertir      = abrirConvertir;
  window.confirmarConversion = confirmarConversion;
  window.buscarDniConvertir  = buscarDniConvertir;
  window.loadSolicitudes     = loadSolicitudes;
</script>
</body>
</html>
