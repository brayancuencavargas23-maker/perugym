<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymPro - Login</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">
        <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px">
          <span id="login-gym-icon" style="color:var(--primary)"></span>
          <h1 style="font-size:28px;color:var(--primary)">PeruGym</h1>
        </div>
        <p>Sistema de Gestión de Gimnasio</p>
      </div>
      <div id="login-error" class="alert alert-danger hidden"></div>
      <form id="login-form">
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" id="username" class="form-control" placeholder="admin" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-full mt-2" id="login-btn">
          Iniciar Sesión
        </button>
      </form>
    </div>
  </div>

  <script src="/js/cache.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/icons.js"></script>
  <script>
    document.getElementById('login-gym-icon').innerHTML = icon('gym', 'width:32px;height:32px');

    // ── Protección bfcache en login ───────────────────────────────────────────
    // Si el usuario llega aquí por el botón "atrás" después de hacer logout,
    // nos aseguramos de que no haya token residual y que el formulario esté limpio.
    function _loginPageGuard() {
      const token = localStorage.getItem('gym_token');
      if (!token) return; // sin token: mostrar login normalmente

      // Hay token: verificar si sigue siendo válido
      try {
        const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        if (payload.exp && payload.exp * 1000 > Date.now()) {
          // Token válido → redirigir al panel (ya está logueado)
          window.location.replace('/dashboard.html');
        } else {
          // Token expirado → limpiar y mostrar login
          localStorage.removeItem('gym_token');
          localStorage.removeItem('gym_user');
        }
      } catch {
        localStorage.removeItem('gym_token');
        localStorage.removeItem('gym_user');
      }
    }

    _loginPageGuard();

    // También se dispara cuando el navegador restaura esta página desde bfcache
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) _loginPageGuard();
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      errEl.classList.add('hidden');
      btn.textContent = 'Ingresando...';
      btn.disabled = true;

      try {
        const data = await api.post('/auth/login', {
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        });
        localStorage.setItem('gym_token', data.token);
        localStorage.setItem('gym_user', JSON.stringify(data.user));
        window.location.replace('/dashboard.html');
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.textContent = 'Iniciar Sesión';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
