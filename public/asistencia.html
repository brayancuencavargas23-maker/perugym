<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Asistencia - PeruGym</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/styles-responsive.css">
  <!-- SPA redirect: si se accede directamente, redirigir al shell -->
  <script>if(!window.__SPA_SHELL__){window.location.replace('/app.html');}</script>
  <style>
    .checkin-opt:hover { background: var(--bg); }
    .checkin-opt:last-child { border-bottom: none !important; }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-content">

      <!-- Check-in rapido -->
      <div class="card mb-2" style="margin-bottom:20px">
        <h3 style="font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:6px" id="h-checkin"></h3>
        <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
          <div class="form-group" style="flex:1;min-width:220px;margin:0;position:relative">
            <label>Buscar Cliente</label>
            <input type="text" id="checkin-search" class="form-control" placeholder="Escribe el nombre..." autocomplete="off">
            <input type="hidden" id="checkin-cliente">
            <div id="checkin-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);z-index:100;max-height:220px;overflow-y:auto;margin-top:2px"></div>
          </div>
          <button class="btn btn-success" onclick="withLoading(this, doCheckin, 'Registrando...')" style="display:inline-flex;align-items:center;gap:6px" id="btn-checkin-el"></button>
          <button class="btn btn-warning" onclick="withLoading(this, doCheckout, 'Registrando...')" style="display:inline-flex;align-items:center;gap:6px" id="btn-checkout-el"></button>
        </div>
      </div>

      <!-- Resumen del dia -->
      <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
        <div class="card" style="flex:1;min-width:140px;padding:16px;text-align:center">
          <div style="font-size:28px;font-weight:700;color:var(--primary)" id="stat-total">-</div>
          <div style="font-size:12px;color:var(--text-light);margin-top:4px">Visitas hoy</div>
        </div>
        <div class="card" style="flex:1;min-width:140px;padding:16px;text-align:center">
          <div style="font-size:28px;font-weight:700;color:#22c55e" id="stat-encurso">-</div>
          <div style="font-size:12px;color:var(--text-light);margin-top:4px">En el gym ahora</div>
        </div>
        <div class="card" style="flex:1;min-width:140px;padding:16px;text-align:center">
          <div style="font-size:28px;font-weight:700;color:#f59e0b" id="stat-promedio">-</div>
          <div style="font-size:12px;color:var(--text-light);margin-top:4px">Duración promedio</div>
        </div>
      </div>

      <!-- Filtros -->
      <div class="card" style="margin-bottom:16px;padding:16px">
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">

          <div class="form-group" style="margin:0;min-width:180px;flex:1">
            <label style="font-size:12px">Buscar cliente</label>
            <input type="text" id="filter-nombre" class="form-control" placeholder="Nombre del cliente...">
          </div>

          <div class="form-group" style="margin:0;min-width:160px">
            <label style="font-size:12px">Cliente específico</label>
            <select id="filter-cliente" class="form-control">
              <option value="">Todos</option>
            </select>
          </div>

          <div class="form-group" style="margin:0">
            <label style="font-size:12px">Estado</label>
            <select id="filter-estado" class="form-control" style="width:140px">
              <option value="">Todos</option>
              <option value="en_curso">En curso</option>
              <option value="completado">Completado</option>
            </select>
          </div>

          <div class="form-group" style="margin:0">
            <label style="font-size:12px">Fecha exacta</label>
            <input type="date" id="filter-date" class="form-control" style="width:160px">
          </div>

          <div class="form-group" style="margin:0">
            <label style="font-size:12px">Desde</label>
            <input type="date" id="filter-from" class="form-control" style="width:150px">
          </div>

          <div class="form-group" style="margin:0">
            <label style="font-size:12px">Hasta</label>
            <input type="date" id="filter-to" class="form-control" style="width:150px">
          </div>

          <div class="form-group" style="margin:0">
            <label style="font-size:12px">Duración mín (min)</label>
            <input type="number" id="filter-dur-min" class="form-control" style="width:120px" placeholder="0" min="0">
          </div>

          <div class="form-group" style="margin:0">
            <label style="font-size:12px">Duración máx (min)</label>
            <input type="number" id="filter-dur-max" class="form-control" style="width:120px" placeholder="∞" min="0">
          </div>

          <div class="form-group" style="margin:0">
            <label style="font-size:12px">Día semana</label>
            <select id="filter-dia-semana" class="form-control" style="width:140px">
              <option value="">Todos</option>
              <option value="1">Lunes</option>
              <option value="2">Martes</option>
              <option value="3">Miércoles</option>
              <option value="4">Jueves</option>
              <option value="5">Viernes</option>
              <option value="6">Sábado</option>
              <option value="0">Domingo</option>
            </select>
          </div>

          <div class="form-group" style="margin:0">
            <label style="font-size:12px">Hora entrada desde</label>
            <input type="time" id="filter-hora-desde" class="form-control" style="width:130px">
          </div>

          <div class="form-group" style="margin:0">
            <label style="font-size:12px">Hora entrada hasta</label>
            <input type="time" id="filter-hora-hasta" class="form-control" style="width:130px">
          </div>

        </div>
        <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="refreshTable()" style="display:inline-flex;align-items:center;gap:6px" id="btn-filter-asis"></button>
          <button class="btn btn-outline" onclick="clearFilters()" style="display:inline-flex;align-items:center;gap:6px" id="btn-clear-asis"></button>
          <button class="btn btn-outline" onclick="exportarCSV()" style="display:inline-flex;align-items:center;gap:6px;margin-left:auto" id="btn-export-asis"></button>
        </div>
      </div>

      <!-- Tabla -->
      <div class="card">
        <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text-light)" id="result-info"></div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>Cliente</th><th>Fecha</th><th>Entrada</th><th>Salida</th><th>Duración</th><th>Acciones</th></tr>
            </thead>
            <tbody id="asistencia-table"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>

    </div>
  </div>
</div>

<script src="/js/cache.js"></script>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/icons.js"></script>
<script src="/js/layout.js"></script>
<script>
  let currentPage = 1;
  let allAsistencia = [];
  let tablePaginator = null;

  function _pageActive() {
    return !!document.getElementById('asistencia-table');
  }

  document.getElementById('filter-date').addEventListener('change', function() {
    if (this.value) {
      document.getElementById('filter-from').value = '';
      document.getElementById('filter-to').value = '';
    }
  });
  document.getElementById('filter-from').addEventListener('change', function() {
    if (this.value) document.getElementById('filter-date').value = '';
  });
  document.getElementById('filter-to').addEventListener('change', function() {
    if (this.value) document.getElementById('filter-date').value = '';
  });

  function buildQS(page, limit) {
    const nombre     = document.getElementById('filter-nombre').value.trim();
    const cliente_id = document.getElementById('filter-cliente').value;
    const estado     = document.getElementById('filter-estado').value;
    const fecha      = document.getElementById('filter-date').value;
    const from       = document.getElementById('filter-from').value;
    const to         = document.getElementById('filter-to').value;
    const durMin     = document.getElementById('filter-dur-min').value;
    const durMax     = document.getElementById('filter-dur-max').value;

    let qs = '?';
    if (page)       qs += 'page=' + page + '&limit=' + (limit || 20);
    if (nombre)     qs += '&nombre=' + encodeURIComponent(nombre);
    if (cliente_id) qs += '&cliente_id=' + cliente_id;
    if (estado)     qs += '&estado=' + estado;
    if (fecha)      qs += '&fecha=' + fecha;
    if (from)       qs += '&from=' + from;
    if (to)         qs += '&to=' + to;
    if (durMin)     qs += '&duracion_min=' + durMin;
    if (durMax)     qs += '&duracion_max=' + durMax;
    return qs;
  }

  async function loadClientes() {
    const data = await api.get('/clientes?activo=true&limit=500');
    if (!_pageActive()) return;
    window._clientesCheckin = data.data;

    function nombreCompleto(c) {
      return [c.nombre, c.apellido_paterno, c.apellido_materno].filter(Boolean).join(' ');
    }

    const opts = '<option value="">Todos</option>' +
      data.data.map(c => '<option value="' + (c._id || c.id) + '">' + nombreCompleto(c) + '</option>').join('');
    const filterCliente = document.getElementById('filter-cliente');
    if (filterCliente) filterCliente.innerHTML = opts;

    initCheckinSearch(data.data);
  }

  function initCheckinSearch(clientes) {
    const input    = document.getElementById('checkin-search');
    const hidden   = document.getElementById('checkin-cliente');
    const dropdown = document.getElementById('checkin-dropdown');

    function nombreCompleto(c) {
      return [c.nombre, c.apellido_paterno, c.apellido_materno].filter(Boolean).join(' ');
    }

    function renderDropdown(lista) {
      if (!lista.length) {
        dropdown.innerHTML = '<div style="padding:10px 14px;color:var(--text-light);font-size:13px">Sin resultados</div>';
        dropdown.style.display = 'block';
        return;
      }
      dropdown.innerHTML = lista.slice(0, 10).map(c => {
        const fullName = nombreCompleto(c);
        return `<div class="checkin-opt" data-id="${c._id || c.id}" data-name="${fullName}"
          style="padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)"
          onmousedown="selectCheckinCliente('${c._id || c.id}','${fullName.replace(/'/g,"\\'")}')">
          ${fullName}
        </div>`;
      }).join('');
      dropdown.style.display = 'block';
    }

    input.addEventListener('input', function() {
      hidden.value = '';
      const q = this.value.trim().toLowerCase();
      if (!q) { dropdown.style.display = 'none'; return; }
      const filtered = clientes.filter(c =>
        nombreCompleto(c).toLowerCase().includes(q) ||
        (c.dni && c.dni.includes(q))
      );
      renderDropdown(filtered);
    });

    input.addEventListener('focus', function() {
      if (this.value.trim() && !hidden.value) {
        const q = this.value.trim().toLowerCase();
        const filtered = clientes.filter(c =>
          nombreCompleto(c).toLowerCase().includes(q) ||
          (c.dni && c.dni.includes(q))
        );
        renderDropdown(filtered);
      }
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('#checkin-search') && !e.target.closest('#checkin-dropdown')) {
        dropdown.style.display = 'none';
      }
    }, { signal: window.__spaPageAbort?.signal });
  }

  window.selectCheckinCliente = function(id, name) {
    document.getElementById('checkin-cliente').value = id;
    document.getElementById('checkin-search').value  = name;
    document.getElementById('checkin-dropdown').style.display = 'none';
  };

  function renderRow(a) {
    const durMin = a.salida
      ? Math.round((new Date(a.salida) - new Date(a.entrada)) / 60000)
      : null;
    const duration = durMin !== null
      ? durMin + ' min'
      : '<span class="badge badge-info">En curso</span>';
    const avatar = a.foto_url
      ? '<img src="' + a.foto_url + '" class="member-avatar" alt="">'
      : '<div class="member-avatar" style="display:flex;align-items:center;justify-content:center">' + avatarInitials(a.cliente_nombre) + '</div>';
    return '<tr>' +
      '<td data-label="Cliente"><div class="member-cell">' + avatar + '<span>' + (a.cliente_nombre || '-') + '</span></div></td>' +
      '<td data-label="Fecha">' + fmtDate(a.fecha) + '</td>' +
      '<td data-label="Entrada">' + fmtDateTime(a.entrada) + '</td>' +
      '<td data-label="Salida">' + (a.salida ? fmtDateTime(a.salida) : '-') + '</td>' +
      '<td data-label="Duración">' + duration + '</td>' +
      '<td data-label="Acciones">' + (!a.salida ? '<button class="btn btn-sm btn-warning" style="display:inline-flex;align-items:center;gap:4px" onclick="withLoading(this, () => checkoutById(\'' + a.id + '\'), \'Registrando...\')">' + icon('checkout') + ' Checkout</button>' : '') + '</td>' +
      '</tr>';
  }

  function getFilteredAsistencia() {
    const nombre = document.getElementById('filter-nombre')?.value.trim().toLowerCase() || '';
    const clienteId = document.getElementById('filter-cliente')?.value || '';
    const estado = document.getElementById('filter-estado')?.value || '';
    const fecha = document.getElementById('filter-date')?.value || '';
    const from = document.getElementById('filter-from')?.value || '';
    const to = document.getElementById('filter-to')?.value || '';
    const durMin = parseInt(document.getElementById('filter-dur-min')?.value) || 0;
    const durMax = parseInt(document.getElementById('filter-dur-max')?.value) || Infinity;
    const diaSemana = document.getElementById('filter-dia-semana')?.value || '';
    const horaDesde = document.getElementById('filter-hora-desde')?.value || '';
    const horaHasta = document.getElementById('filter-hora-hasta')?.value || '';

    return allAsistencia.filter(a => {
      if (nombre) {
        const name = (a.cliente_nombre || '').toLowerCase();
        if (!name.includes(nombre)) return false;
      }
      if (clienteId && a.cliente_id !== clienteId) return false;
      if (estado === 'en_curso' && a.salida) return false;
      if (estado === 'completado' && !a.salida) return false;
      if (fecha && a.fecha) {
        const aDate = new Date(a.fecha).toISOString().split('T')[0];
        if (aDate !== fecha) return false;
      }
      if (from && a.fecha) {
        if (new Date(a.fecha) < new Date(from)) return false;
      }
      if (to && a.fecha) {
        const toDate = new Date(to);
        toDate.setHours(23, 59, 59);
        if (new Date(a.fecha) > toDate) return false;
      }
      if (durMin || durMax !== Infinity) {
        const dur = a.salida ? Math.round((new Date(a.salida) - new Date(a.entrada)) / 60000) : null;
        if (dur === null) return false;
        if (dur < durMin || dur > durMax) return false;
      }
      if (diaSemana !== '' && a.fecha) {
        const d = new Date(a.fecha).getDay();
        if (d !== parseInt(diaSemana)) return false;
      }
      if (horaDesde && a.entrada) {
        const h = new Date(a.entrada).toTimeString().slice(0, 5);
        if (h < horaDesde) return false;
      }
      if (horaHasta && a.entrada) {
        const h = new Date(a.entrada).toTimeString().slice(0, 5);
        if (h > horaHasta) return false;
      }
      return true;
    });
  }

  function refreshTable() {
    if (!_pageActive()) return;
    const filtered = getFilteredAsistencia();
    const resultInfo = document.getElementById('result-info');
    if (resultInfo) {
      resultInfo.textContent = filtered.length + ' registro' + (filtered.length !== 1 ? 's' : '') + ' encontrado' + (filtered.length !== 1 ? 's' : '');
    }
    if (tablePaginator) {
      tablePaginator.setData(filtered);
    } else {
      tablePaginator = initTablePagination('pagination', 'asistencia-table', filtered, 10, renderRow);
    }
  }

  async function loadAsistencia() {
    if (!_pageActive()) return;
    showTableSkeleton('asistencia-table', 6);
    try {
      const data = await api.get('/asistencia?limit=500');
      if (!_pageActive()) return;
      allAsistencia = data.data;

      if (data.stats) {
        const statTotal = document.getElementById('stat-total');
        const statEnCurso = document.getElementById('stat-encurso');
        const statPromedio = document.getElementById('stat-promedio');
        
        if (statTotal) statTotal.textContent = data.stats.total_hoy || 0;
        if (statEnCurso) statEnCurso.textContent = data.stats.en_curso || 0;
        if (statPromedio) statPromedio.textContent = data.stats.promedio_min ? data.stats.promedio_min + ' min' : '-';
      }

      refreshTable();
    } catch (err) { toast(err.message, 'error'); }
  }

  function clearFilters() {
    document.getElementById('filter-nombre').value   = '';
    document.getElementById('filter-cliente').value  = '';
    document.getElementById('filter-estado').value   = '';
    document.getElementById('filter-date').value     = '';
    document.getElementById('filter-from').value     = '';
    document.getElementById('filter-to').value       = '';
    document.getElementById('filter-dur-min').value  = '';
    document.getElementById('filter-dur-max').value  = '';
    document.getElementById('filter-dia-semana').value = '';
    document.getElementById('filter-hora-desde').value = '';
    document.getElementById('filter-hora-hasta').value = '';
    loadAsistencia();
  }

  function exportarCSV() {
    const qs = buildQS(null, null).replace('?', '');
    const token = api.getToken();
    fetch('/api/asistencia/export?' + qs, { headers: { Authorization: 'Bearer ' + token } })
      .then(function(res) {
        if (!res.ok) throw new Error('Error al exportar');
        return res.blob();
      })
      .then(function(blob) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'asistencias.xlsx';
        a.click();
        URL.revokeObjectURL(url);
      })
      .catch(function(err) { toast(err.message, 'error'); });
  }

  async function doCheckin() {
    const cliente_id = document.getElementById('checkin-cliente').value;
    if (!cliente_id) return toast('Selecciona un cliente', 'warning');
    try {
      const nueva = await api.post('/asistencia/checkin', { cliente_id: cliente_id });
      if (!_pageActive()) return;
      if (nueva) {
        allAsistencia.unshift(nueva);
      }
      toast('Check-in registrado');
      const searchEl = document.getElementById('checkin-search');
      const clientEl = document.getElementById('checkin-cliente');
      if (searchEl) searchEl.value = '';
      if (clientEl) clientEl.value = '';
      gymCache.invalidateMany(['asistencia', 'dashboard']);
      refreshTable();
    } catch (err) { toast(err.message, 'error'); }
  }

  async function doCheckout() {
    const cliente_id = document.getElementById('checkin-cliente').value;
    if (!cliente_id) return toast('Selecciona un cliente', 'warning');
    try {
      const updated = await api.put('/asistencia/checkout/cliente/' + cliente_id, {});
      if (!_pageActive()) return;
      if (updated) {
        const idx = allAsistencia.findIndex(a => a.id === updated.id || a._id === updated._id);
        if (idx !== -1) allAsistencia[idx] = { ...allAsistencia[idx], ...updated };
      }
      toast('Check-out registrado');
      const searchEl = document.getElementById('checkin-search');
      const clientEl = document.getElementById('checkin-cliente');
      if (searchEl) searchEl.value = '';
      if (clientEl) clientEl.value = '';
      gymCache.invalidateMany(['asistencia', 'dashboard']);
      refreshTable();
    } catch (err) { toast(err.message, 'error'); }
  }

  async function checkoutById(id) {
    try {
      const updated = await api.put('/asistencia/checkout/' + id, {});
      if (!_pageActive()) return;
      if (updated) {
        const idx = allAsistencia.findIndex(a => a.id === id || a._id === id);
        if (idx !== -1) allAsistencia[idx] = { ...allAsistencia[idx], ...updated };
      }
      toast('Check-out registrado');
      gymCache.invalidateMany(['asistencia', 'dashboard']);
      refreshTable();
    } catch (err) { toast(err.message, 'error'); }
  }

  loadClientes();
  loadAsistencia();

  // ── Inicialización de iconos ────────────────────────────────────────────────
  (function _initPage() {
    initLayout('asistencia', 'Asistencia');
    const iconMap = {
      'h-checkin':        icon('checkin') + ' Check-in Rápido',
      'btn-checkin-el':   icon('checkin') + ' Check-in',
      'btn-checkout-el':  icon('checkout') + ' Check-out',
      'btn-filter-asis':  icon('search') + ' Filtrar',
      'btn-clear-asis':   icon('close') + ' Limpiar',
      'btn-export-asis':  icon('download') + ' Exportar Excel',
    };
    Object.entries(iconMap).forEach(([id, html]) => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = html;
    });
  })();

  // Exponer funciones al scope global para que los onclick funcionen en el SPA
  window.doCheckin      = doCheckin;
  window.doCheckout     = doCheckout;
  window.checkoutById   = checkoutById;
  window.loadAsistencia = loadAsistencia;
  window.clearFilters   = clearFilters;
  window.exportarCSV    = exportarCSV;

  // ── Event listeners filtros ────────────────────────────────────────────────
  ['filter-nombre','filter-cliente','filter-estado','filter-date','filter-from','filter-to',
   'filter-dur-min','filter-dur-max','filter-dia-semana','filter-hora-desde','filter-hora-hasta'
  ].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener(el.tagName === 'SELECT' ? 'change' : 'input', () => refreshTable());
  });
</script>
</body>
</html>
