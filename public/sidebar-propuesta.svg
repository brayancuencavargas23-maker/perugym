<svg xmlns="http://www.w3.org/2000/svg" width="320" height="820" viewBox="0 0 320 820" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="sidebarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="activeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(108,99,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(108,99,255,0.05)"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo sidebar -->
  <rect width="320" height="820" fill="url(#sidebarGrad)" rx="0"/>

  <!-- Borde derecho sutil -->
  <line x1="319" y1="0" x2="319" y2="820" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- HEADER / LOGO                              -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="0" y="0" width="320" height="80" fill="rgba(0,0,0,0.2)"/>

  <!-- Logo icon -->
  <rect x="20" y="20" width="40" height="40" rx="10" fill="url(#logoGrad)"/>
  <!-- Dumbbell icon simplified -->
  <rect x="28" y="37" width="24" height="6" rx="3" fill="white"/>
  <rect x="26" y="33" width="6" height="14" rx="3" fill="white"/>
  <rect x="44" y="33" width="6" height="14" rx="3" fill="white"/>

  <!-- Nombre empresa -->
  <text x="70" y="38" fill="white" font-size="16" font-weight="700" letter-spacing="0.5">PeruGym</text>
  <text x="70" y="54" fill="rgba(255,255,255,0.4)" font-size="11">Sistema de Gestión</text>

  <!-- Badge versión -->
  <rect x="70" y="58" width="36" height="14" rx="7" fill="rgba(108,99,255,0.3)"/>
  <text x="88" y="68" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">v2.0</text>

  <!-- Separador header -->
  <line x1="0" y1="80" x2="320" y2="80" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>


  <!-- ══════════════════════════════════════════ -->
  <!-- SECCIÓN 1: PRINCIPAL                       -->
  <!-- ══════════════════════════════════════════ -->
  <text x="20" y="104" fill="rgba(255,255,255,0.3)" font-size="10" font-weight="700" letter-spacing="1.5">PRINCIPAL</text>

  <!-- Dashboard (ACTIVO) -->
  <rect x="10" y="110" width="300" height="42" rx="8" fill="url(#activeGrad)"/>
  <rect x="10" y="110" width="3" height="42" rx="1.5" fill="#6c63ff"/>
  <!-- Icon dashboard -->
  <rect x="26" y="122" width="8" height="8" rx="1.5" fill="#6c63ff"/>
  <rect x="36" y="118" width="8" height="12" rx="1.5" fill="#6c63ff"/>
  <rect x="46" y="125" width="8" height="5" rx="1.5" fill="#6c63ff"/>
  <text x="66" y="135" fill="white" font-size="13" font-weight="600">Dashboard</text>
  <!-- Dot activo -->
  <circle cx="296" cy="131" r="3" fill="#6c63ff" filter="url(#glow)"/>

  <!-- Reportes -->
  <rect x="10" y="158" width="300" height="42" rx="8" fill="transparent"/>
  <!-- Icon chart -->
  <polyline points="26,188 34,178 42,183 50,172" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="66" y="183" fill="rgba(255,255,255,0.6)" font-size="13">Reportes</text>


  <!-- ══════════════════════════════════════════ -->
  <!-- SECCIÓN 2: MEMBRESÍAS                      -->
  <!-- ══════════════════════════════════════════ -->
  <line x1="20" y1="210" x2="300" y2="210" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="20" y="228" fill="rgba(255,255,255,0.3)" font-size="10" font-weight="700" letter-spacing="1.5">MEMBRESÍAS</text>

  <!-- Clientes -->
  <rect x="10" y="234" width="300" height="42" rx="8" fill="transparent"/>
  <!-- Icon person -->
  <circle cx="38" cy="248" r="5" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8"/>
  <path d="M28 264 Q38 258 48 264" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8" stroke-linecap="round"/>
  <text x="66" y="259" fill="rgba(255,255,255,0.6)" font-size="13">Clientes</text>

  <!-- Membresías -->
  <rect x="10" y="282" width="300" height="42" rx="8" fill="transparent"/>
  <!-- Icon card -->
  <rect x="26" y="292" width="26" height="18" rx="3" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8"/>
  <line x1="26" y1="298" x2="52" y2="298" stroke="rgba(255,255,255,0.45)" stroke-width="1.8"/>
  <text x="66" y="305" fill="rgba(255,255,255,0.6)" font-size="13">Membresías</text>

  <!-- Planes -->
  <rect x="10" y="330" width="300" height="42" rx="8" fill="transparent"/>
  <!-- Icon layers -->
  <path d="M39 340 L26 346 L39 352 L52 346 Z" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M26 352 L39 358 L52 352" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="66" y="355" fill="rgba(255,255,255,0.6)" font-size="13">Planes</text>

  <!-- Solicitudes -->
  <rect x="10" y="378" width="300" height="42" rx="8" fill="transparent"/>
  <!-- Icon clipboard -->
  <rect x="28" y="388" width="22" height="26" rx="3" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8"/>
  <rect x="33" y="385" width="12" height="6" rx="2" fill="rgba(255,255,255,0.45)"/>
  <line x1="33" y1="400" x2="45" y2="400" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <line x1="33" y1="406" x2="42" y2="406" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <text x="66" y="403" fill="rgba(255,255,255,0.6)" font-size="13">Solicitudes</text>
  <!-- Badge notificación -->
  <rect x="258" y="390" width="36" height="18" rx="9" fill="#dc3545"/>
  <text x="276" y="402" fill="white" font-size="10" font-weight="700" text-anchor="middle">3</text>


  <!-- ══════════════════════════════════════════ -->
  <!-- SECCIÓN 3: OPERACIONES                     -->
  <!-- ══════════════════════════════════════════ -->
  <line x1="20" y1="432" x2="300" y2="432" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="20" y="450" fill="rgba(255,255,255,0.3)" font-size="10" font-weight="700" letter-spacing="1.5">OPERACIONES</text>

  <!-- Asistencia -->
  <rect x="10" y="456" width="300" height="42" rx="8" fill="transparent"/>
  <!-- Icon check-circle -->
  <circle cx="39" cy="477" r="10" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8"/>
  <polyline points="33,477 37,481 45,473" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="66" y="481" fill="rgba(255,255,255,0.6)" font-size="13">Asistencia</text>

  <!-- Pagos -->
  <rect x="10" y="504" width="300" height="42" rx="8" fill="transparent"/>
  <!-- Icon dollar -->
  <circle cx="39" cy="525" r="10" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8"/>
  <text x="39" y="530" fill="rgba(255,255,255,0.45)" font-size="13" font-weight="700" text-anchor="middle">$</text>
  <text x="66" y="529" fill="rgba(255,255,255,0.6)" font-size="13">Pagos</text>

  <!-- Caja -->
  <rect x="10" y="552" width="300" height="42" rx="8" fill="transparent"/>
  <!-- Icon briefcase -->
  <rect x="27" y="562" width="24" height="18" rx="3" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8"/>
  <path d="M33 562 L33 558 Q39 555 45 558 L45 562" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="27" y1="571" x2="51" y2="571" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <text x="66" y="575" fill="rgba(255,255,255,0.6)" font-size="13">Caja</text>

  <!-- Productos -->
  <rect x="10" y="600" width="300" height="42" rx="8" fill="transparent"/>
  <!-- Icon box -->
  <path d="M39 610 L52 617 L52 631 L39 638 L26 631 L26 617 Z" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8" stroke-linejoin="round"/>
  <line x1="39" y1="610" x2="39" y2="638" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <line x1="26" y1="617" x2="52" y2="617" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <text x="66" y="625" fill="rgba(255,255,255,0.6)" font-size="13">Productos</text>


  <!-- ══════════════════════════════════════════ -->
  <!-- SECCIÓN 4: ADMINISTRACIÓN (admin only)     -->
  <!-- ══════════════════════════════════════════ -->
  <line x1="20" y1="654" x2="300" y2="654" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="20" y="672" fill="rgba(255,255,255,0.3)" font-size="10" font-weight="700" letter-spacing="1.5">ADMINISTRACIÓN</text>

  <!-- Usuarios -->
  <rect x="10" y="678" width="300" height="42" rx="8" fill="transparent"/>
  <!-- Icon users -->
  <circle cx="34" cy="692" r="5" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8"/>
  <path d="M24 708 Q34 702 44 708" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="46" cy="691" r="4" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <path d="M40 707 Q46 703 52 707" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <text x="66" y="703" fill="rgba(255,255,255,0.6)" font-size="13">Usuarios</text>
  <!-- Badge admin -->
  <rect x="248" y="688" width="46" height="16" rx="8" fill="rgba(108,99,255,0.25)"/>
  <text x="271" y="699" fill="#a78bfa" font-size="9" font-weight="700" text-anchor="middle">ADMIN</text>

  <!-- Landing -->
  <rect x="10" y="726" width="300" height="42" rx="8" fill="transparent"/>
  <!-- Icon globe -->
  <circle cx="39" cy="747" r="10" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8"/>
  <ellipse cx="39" cy="747" rx="5" ry="10" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <line x1="29" y1="747" x2="49" y2="747" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <text x="66" y="751" fill="rgba(255,255,255,0.6)" font-size="13">Landing Page</text>
  <!-- Badge admin -->
  <rect x="248" y="736" width="46" height="16" rx="8" fill="rgba(108,99,255,0.25)"/>
  <text x="271" y="747" fill="#a78bfa" font-size="9" font-weight="700" text-anchor="middle">ADMIN</text>


  <!-- ══════════════════════════════════════════ -->
  <!-- FOOTER / USUARIO                           -->
  <!-- ══════════════════════════════════════════ -->
  <line x1="0" y1="778" x2="320" y2="778" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect x="0" y="778" width="320" height="42" fill="rgba(0,0,0,0.2)"/>

  <!-- Avatar -->
  <circle cx="36" cy="799" r="14" fill="url(#logoGrad)"/>
  <text x="36" y="804" fill="white" font-size="12" font-weight="700" text-anchor="middle">JA</text>

  <!-- Info usuario -->
  <text x="58" y="795" fill="white" font-size="12" font-weight="600">Juan Admin</text>
  <text x="58" y="809" fill="rgba(255,255,255,0.4)" font-size="10">Administrador</text>

  <!-- Botón logout -->
  <rect x="270" y="787" width="34" height="24" rx="6" fill="rgba(220,53,69,0.2)"/>
  <!-- Icon logout arrow -->
  <path d="M278 799 L286 799 M283 795 L287 799 L283 803" fill="none" stroke="#dc3545" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="280" y1="793" x2="280" y2="805" stroke="#dc3545" stroke-width="1.5" stroke-linecap="round"/>

</svg>
