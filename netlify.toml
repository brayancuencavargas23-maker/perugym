[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "PORT,NODE_ENV"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Fallback para rutas no encontradas → landing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions."vencer-membresias"]
  schedule = "0 2 * * *"

[functions."api"]
  included_files = ["public/imagenes/**"]

# Cache para assets estáticos (CSS, JS, imágenes locales)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/imagenes/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
